<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <title>Finance App</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="icon" type="image/png" sizes="40x40" href="assets/Img/Oink_1.png">
    <!-- LIBRERIAS -->
    <link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="brand">
            <img src="assets/Img/Oink_1.png" class="logo">
            <div class="brand-text">
                <span class="title title-main">Oink</span>
                <span class="text text-secondary">Tu aliado financiero</span>
            </div>
        </div>
    </header>

    <!-- WRAPPER: sidebar + contenido -->
    <div class="page-wrapper">

        <!-- SIDEBAR -->
        <aside class="sidebar">

            <!-- 🟢 LANDING NAV -->
            <div id="landing-nav" class="landing-nav">
                <button class="btn  btn-balance" id="btn-go-login">Iniciar Sesion</button>
                <button class="btn btn-base btn-register">Registrarse</button>
            </div>

            <!-- 🔵 APP -->
            <div id="app-nav">

                <section class="profiles-panel">
                    <h2 class="subtitle">Perfiles</h2>
                    <div class="profiles-list">
                        <div class="profile-item active">
                            <div class="profile-avatar">J</div>
                            <span class="text text-main2">Juan</span>
                        </div>
                        <div class="profile-item">
                            <div class="profile-avatar">A</div>
                            <span class="text text-main2">Ana</span>
                        </div>
                        <div class="profile-item">
                            <div class="profile-avatar">M</div>
                            <span class="text text-main2">Maria</span>
                        </div>
                    </div>
                    <div class="profile-add">
                        <img src="assets/icons/user-plus.svg" class="icon">
                        <span class="text text-secondary">Agregar perfil</span>
                    </div>
                </section>

                <nav class="navigation">
                    <a class="nav-item active" href="#" data-page="home">
                        <img src="assets/icons/home.svg" class="icon">
                        <span class="text text-main">Inicio</span>
                    </a>
                    <a class="nav-item" href="#" data-page="ingresos">
                        <img src="assets/icons/increase.svg" class="icon">
                        <span class="text text-main">Ingresos</span>
                    </a>
                    <a class="nav-item" href="#" data-page="gastos">
                        <img src="assets/icons/degrowth.svg" class="icon">
                        <span class="text text-main">Gastos</span>
                    </a>
                    <a class="nav-item" href="#" data-page="deudas">
                        <img src="assets/icons/credit-card.svg" class="icon">
                        <span class="text text-main">Deudas</span>
                    </a>
                    <a class="nav-item" href="#" data-page="ahorro">
                        <img src="assets/icons/saving.svg" class="icon ">
                        <span class="text text-main">Ahorro</span>
                    </a>
                    <a class="nav-item" href="#" data-page="analisis">
                        <img src="assets/icons/analisis.svg" class="icon  ">
                        <span class="text text-main">Analisis</span>
                    </a>
                </nav>
            </div>

        </aside>

        <!-- CONTENIDO PRINCIPAL -->

        <main class="content" id="main-content">

            <!-- Aquí va el contenido de cada página -->
        </main>

    </div>

    <div id="login-modal" class="modal hidden">
        <div class="modal-overlay"></div>

        <div class="modal-content">
            <h2 class="title-main">Inicio de Sesion</h2>


            <div class="form form-balance">

                <div class="fields-login">
                    <div class="field">
                        <span class="text text-secondary">Correo</span>
                        <input class="input" placeholder="Correo">
                    </div>

                    <div class="field">
                        <span class="text text-secondary">Contraseña</span>
                        <input class="input" placeholder="Contraseña">
                        <span class="text text-secondary text-light">¿Olvidaste tu contraseña?</span>
                    </div>


                    <button class="btn  btn-balance" id="btn-start">Iniciar Sesion</button>
                    <div class="field">
                        <span class="text text-secondary  text-light">¿No tienes una cuenta?</span>
                        <button class="btn btn-base">Registrarse</button>
                    </div>



                </div>

            </div>
        </div>
    </div>

    <script src="assets/js/router.js"></script>

</body>

</html>
