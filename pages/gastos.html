<div class="history-card">
    <h2 class="subtitle">Historial de Gastos</h2>

    <div class="history-item">
        <div class="history-item-info">
            <span class="text text-main" style="font-weight: 600;">Uber</span>
            <div class="history-item-meta">
                <button class="icon-btn">
                    <img src="assets/icons/calendar.svg" class="icon icon-sm">
                </button>
                <span class="text text-secondary">20/02/2026</span>
                <span class="text text-secondary">Mensual</span>
            </div>
        </div>
        <div class="history-item-actions">
            <span class="text text-main text-expense" style="font-weight: 600;">$50.000</span>
            <button class="icon-btn">
                <img src="assets/icons/edit.svg" class="icon icon-sm icon-balance">
            </button>
            <button class="icon-btn">
                <img src="assets/icons/trash.svg" class="icon icon-sm icon-expense">
            </button>
        </div>
    </div>

    <div class="form form-expense">

        <div class="fields">
            <div class="field">
                <span class="text text-secondary">Nombre</span>
                <input class="input" placeholder="Nombre">
            </div>

            <div class="field">
                <span class="text text-secondary">Monto</span>
                <input class="input" placeholder="Monto">
            </div>

            <div class="field">
                <span class="text text-secondary">Categoria</span>
                <select id="categoria-select">
                    <option value="" disabled selected>Selecciona una categoría</option>
                    <option value="alimentacion">Alimentación</option>
                    <option value="transporte">Transporte</option>
                    <option value="vivienda">Vivienda</option>
                    <option value="salud">Salud</option>
                    <option value="educacion">Educación</option>
                    <option value="entretenimiento">Entretenimiento</option>
                    <option value="ropa">Ropa y calzado</option>
                    <option value="servicios">Servicios públicos</option>
                    <option value="tecnologia">Tecnología</option>
                    <option value="mascotas">Mascotas</option>
                    <option value="viajes">Viajes</option>
                    <option value="otro">Otro</option>
                </select>
            </div>

            <div class="field">
                <span class="text text-secondary">Fecha</span>
                <input class="input input-date" placeholder="Selecciona una fecha" readonly>
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-expense">Guardar</button>
            <button class="btn btn-base">Cancelar</button>
        </div>

    </div>

</div>
