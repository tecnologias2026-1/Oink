<div class="history-card">
    <div class="history-card-header">
        <span class="subtitle">Deudas</span>
        <button class="btn btn-debt" style="width: auto; padding: 10px 16px;">
            <img src="assets/icons/plus.svg" class="icon icon-sm" style="filter: brightness(0) invert(1);">
            Agregar Deudas
        </button>
    </div>

    <div class="debt-item">
        <div class="debt-item-header">
            <div class="history-item-info">
                <span class="text text-main" style="font-weight: 600;">Alkosoto</span>
                <div class="history-item-meta">
                    <button class="icon-btn">
                        <img src="assets/icons/calendar.svg" class="icon icon-sm">
                    </button>
                    <span class="text text-secondary  text-light"">26/02/2026</span>
                    <span class=" text text-secondary text-light"">Interes anual: 10%</span>
                </div>
            </div>
        </div>

        <div class="debt-item-stats">
            <div class="debt-stat">
                <span class="text text-secondary text-light">Total Original</span>
                <span class="text text-main" style="font-weight: 600;">$5.000.000</span>
            </div>
            <div class="debt-stat">
                <span class="text text-secondary text-light">Restante</span>
                <span class="text text-main text-debt" style="font-weight: 600;">$2.500.000</span>
            </div>
            <div class="debt-stat">
                <span class="text text-secondary text-light">Pago Mensual</span>
                <span class="text text-main" style="font-weight: 600;">$500.000</span>
            </div>
            <div class="debt-stat">
                <span class="text text-secondary text-light">Meses Restantes</span>
                <span class="text text-main" style="font-weight: 600;">5 Meses</span>
            </div>
        </div>

        <div class="debt-item-progress">
            <div class="distribution-header">
                <span class="text text-secondary">Progreso de pago</span>
                <span class="text text-secondary">50%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill progress-debt" style="width: 50%"></div>
            </div>
        </div>
    </div>

    <div class="form form-debt">
        <div class="fields">
            <div class="field">
                <span class="text text-secondary">Nombre</span>
                <input class="input" placeholder="Nombre">
            </div>

            <div class="field">
                <span class="text text-secondary">Total Monto</span>
                <input class="input" placeholder="Total Monto">
            </div>

            <div class="field">
                <span class="text text-secondary">Monto Restante</span>
                <input class="input" placeholder="Monto Restante">
            </div>

            <div class="field">
                <span class="text text-secondary">Categoria</span>
                <select id="categoria-select">
                    <option value="" disabled selected>Selecciona una categoría</option>
                    <option value="tarjeta">Tarjeta de crédito</option>
                    <option value="prestamo">Préstamo personal</option>
                    <option value="hipoteca">Hipoteca</option>
                    <option value="vehiculo">Crédito vehículo</option>
                    <option value="estudiantil">Préstamo estudiantil</option>
                    <option value="familiar">Deuda familiar</option>
                    <option value="negocio">Deuda de negocio</option>
                    <option value="otro">Otro</option>
                </select>
            </div>

            <div class="field">
                <span class="text text-secondary">Fecha de Vencimiento</span>
                <input class="input input-date" placeholder="Selecciona una fecha" readonly>
            </div>

            <div class="field">
                <span class="text text-secondary">Tasa de interes</span>
                <input class="input" placeholder="Tasa de interes">
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-debt">Guardar</button>
            <button class="btn btn-base">Cancelar</button>
        </div>
    </div>
</div>
