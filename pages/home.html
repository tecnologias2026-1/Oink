<div class="content-header">
    <div class="profile-avatar">J</div>
    <span class="title title-main">Bienvenido, Juan</span>
</div>

<!-- CARD 1 -->
<div class="stats-row">
    <div class="stat-card">
        <div class="stat-card-info">
            <span class="text text-secondary">Ingresos</span>
            <span class="title title-main title-income">$0.00</span>
        </div>
        <div class="icon-container">
            <div class="icon-bg icon-bg-income"></div>
            <img src="assets/icons/increase.svg" class="icon icon-income">
        </div>
    </div>

    <div class="stat-card">
        <div class="stat-card-info">
            <span class="text text-secondary">Gastos</span>
            <span class="title title-main title-expense">$0.00</span>
        </div>
        <div class="icon-container">
            <div class="icon-bg icon-bg-expense"></div>
            <img src="assets/icons/degrowth.svg" class="icon icon-expense">
        </div>
    </div>

    <div class="stat-card">
        <div class="stat-card-info">
            <span class="text text-secondary">Deudas</span>
            <span class="title title-main title-debt">$0.00</span>
        </div>
        <div class="icon-container">
            <div class="icon-bg icon-bg-debt"></div>
            <img src="assets/icons/credit-card.svg" class="icon icon-debt">
        </div>
    </div>

    <div class="stat-card">
        <div class="stat-card-info">
            <span class="text text-secondary">Balance</span>
            <span class="title title-main title-savings">$0.00</span>
        </div>
        <div class="icon-container">
            <div class="icon-bg icon-bg-savings"></div>
            <img src="assets/icons/saving.svg" class="icon icon-savings">
        </div>
    </div>
</div>

<!-- CARD 2 -->

<div class="stats-row">

    <div class="register-card">
        <div class="register-card-header">
            <img src="assets/icons/plus.svg" class="icon icon-income">
            <span class="subtitle">Registrar Ingresos</span>
        </div>
        <input class="input" placeholder="Nombre">
        <input class="input" placeholder="Monto">
        <button class="btn btn-income">Registrar</button>
    </div>

    <div class="register-card">
        <div class="register-card-header">
            <img src="assets/icons/plus.svg" class="icon icon-expense">
            <span class="subtitle">Registrar Gastos</span>
        </div>
        <input class="input" placeholder="Nombre">
        <input class="input" placeholder="Monto">
        <button class="btn btn-expense">Registrar</button>
    </div>
</div>


<!-- CARD 3 -->

<div class="analysis-row">

    <div class="distribution-card">
        <span class="subtitle">Distribución del Presupuesto</span>

        <div class="distribution-item">
            <div class="distribution-header">
                <span class="text text-main2">Gastos</span>
                <span class="text text-main2">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill progress-expense" style="width: 0%"></div>
            </div>
        </div>

        <div class="distribution-item">
            <div class="distribution-header">
                <span class="text text-main2">Ahorro Potencial</span>
                <span class="text text-main2">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill progress-income" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <div class="financial-state-card">
        <span class="subtitle">Estado Financiero</span>

        <div class="financial-state-item">
            <span class="text text-light text-main2">Total de Ingresos:</span>
            <span class="text text-main2 text-income">$0</span>
        </div>

        <div class="financial-state-item">
            <span class="text text-light text-main2">Total de Gastos:</span>
            <span class="text text-main2 text-expense">$0</span>
        </div>

        <div class="financial-state-item">
            <span class="text text-light text-main2">Pagos de Deuda:</span>
            <span class="text text-main2 text-debt">$0</span>
        </div>

        <div class="financial-state-item financial-state-total">
            <span class="text text-main text-balance" style="font-weight: 600;">Balance Neto:</span>
            <span class="text text-main text-balance" style="font-weight: 600;">$0,0</span>
        </div>
    </div>
</div>


<div class="chart-card">
    <span class="subtitle">Visualización de Presupuesto</span>

    <div class="chart-area">
        <!-- aquí irá la gráfica con JS -->
    </div>

    <div class="chart-bars">
        <div class="chart-bar-item bg-income">
            <div class="icon-container">
                <div class="icon-bg icon-bg-income"></div>
                <img src="assets/icons/increase.svg" class="icon icon-income">
            </div>
        </div>
        <div class="chart-bar-item bg-debt">
            <div class="icon-container">
                <div class="icon-bg icon-bg-debt"></div>
                <img src="assets/icons/credit-card.svg" class="icon icon-debt">
            </div>
        </div>
        <div class="chart-bar-item bg-expense">
            <div class="icon-container">
                <div class="icon-bg icon-bg-expense"></div>
                <img src="assets/icons/degrowth.svg" class="icon icon-expense">
            </div>
        </div>
        <div class="chart-bar-item bg-savings">
            <div class="icon-container">
                <div class="icon-bg icon-bg-savings"></div>
                <img src="assets/icons/saving.svg" class="icon icon-savings">
            </div>
        </div>
    </div>
</div>
