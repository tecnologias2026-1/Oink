<div class="history-card">
    <h2 class="subtitle">Historial de Ingresos</h2>

    <div class="history-item">
        <div class="history-item-info">
            <span class="text text-main" style="font-weight: 600;">Salario</span>
            <div class="history-item-meta">
                <button class="icon-btn">
                    <img src="assets/icons/calendar.svg" class="icon icon-sm ">
                </button>
                <span class="text text-secondary">20/02/2026</span>
                <span class="text text-secondary">Mensual</span>
            </div>
        </div>
        <div class="history-item-actions">
            <span class="text text-main text-income" style="font-weight: 600;">$1.000.000</span>
            <button class="icon-btn">
                <img src="assets/icons/edit.svg" class="icon icon-sm icon-balance">
            </button>
            <button class="icon-btn">
                <img src="assets/icons/trash.svg" class="icon icon-sm icon-expense">
            </button>
        </div>
    </div>


    <div class="form form-income">

        <div class="fields">
            <div class="field">
                <span class="text text-secondary">Nombre</span>
                <input class="input" placeholder="Nombre">
            </div>

            <div class="field">
                <span class="text text-secondary">Monto</span>
                <input class="input" placeholder="Monto">
            </div>

            <div class="field">
                <span class="text text-secondary">Categoría</span>
                <select id="categoria-select">
                    <option value="" disabled selected>Selecciona una categoría</option>
                    <option value="salario">Salario</option>
                    <option value="freelance">Freelance</option>
                    <option value="negocio">Negocio propio</option>
                    <option value="inversiones">Inversiones</option>
                    <option value="alquiler">Alquiler</option>
                    <option value="dividendos">Dividendos</option>
                    <option value="pension">Pensión</option>
                    <option value="bono">Bono</option>
                    <option value="regalo">Regalo</option>
                    <option value="venta">Venta de activos</option>
                    <option value="otro">Otro</option>
                </select>
            </div>

            <div class="field">
                <span class="text text-secondary">Fecha</span>
                <input class="input input-date" type="date">
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-income">Guardar</button>
            <button class="btn btn-base">Cancelar</button>
        </div>

    </div>
</div>
