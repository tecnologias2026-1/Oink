<div class="history-card">
    <div class="history-card-header">
        <span class="subtitle">Ahorro</span>
        <button class="btn btn-savings" style="width: auto; padding: 10px 16px;">
            <img src="assets/icons/plus.svg" class="icon icon-sm" style="filter: brightness(0) invert(1);">
            Nuevo Ahorro
        </button>
    </div>

    <div class="stats-row ">
        <div class="stat-card stat-card-border">
            <div class="stat-card-info">
                <span class="text text-secondary">Disponible</span>
                <span class="title title-main title-savings">$0.00</span>
            </div>
            <div class="icon-container">
                <div class="icon-bg icon-bg-savings"></div>
                <img src="assets/icons/gift.svg" class="icon icon-savings">
            </div>
        </div>

        <div class="stat-card stat-card-border">
            <div class="stat-card-info">
                <span class="text text-secondary">Asignado</span>
                <span class="title title-main title-savings">$0.00</span>
            </div>
            <div class="icon-container">
                <div class="icon-bg icon-bg-savings"></div>
                <img src="assets/icons/money.svg" class="icon icon-savings">
            </div>
        </div>

        <div class="stat-card stat-card-border">
            <div class="stat-card-info">
                <span class="text text-secondary">Restante</span>
                <span class="title title-main title-savings">$0.00</span>
            </div>
            <div class="icon-container">
                <div class="icon-bg icon-bg-savings"></div>
                <img src="assets/icons/pesos.svg" class="icon icon-savings">
            </div>
        </div>
    </div>


    <div class="history-item">
        <div class="history-item-info">
            <span class="text text-main" style="font-weight: 600;">Carro</span>
            <div class="history-item-meta">
                <button class="icon-btn">
                    <img src="assets/icons/percent.svg" class="icon icon-sm">
                </button>
                <span class="text text-secondary">10%</span>
                <span class="text text-secondary">Porcentaje</span>
            </div>
        </div>
        <div class="history-item-actions">
            <span class="text text-main text-savings" style="font-weight: 600;">$100.000</span>
            <button class="icon-btn">
                <img src="assets/icons/edit.svg" class="icon icon-sm icon-balance">
            </button>
            <button class="icon-btn">
                <img src="assets/icons/trash.svg" class="icon icon-sm icon-expense">
            </button>
        </div>
    </div>

    <div class="form form-savings">
        <div class="fields">
            <div class="field">
                <span class="text text-secondary">Nombre</span>
                <input class="input" placeholder="Nombre">
            </div>

            <div class="field">
                <span class="text text-secondary">Porcentaje de Ahorro</span>
                <input class="input" placeholder="Porcentaje de Ahorro">
            </div>

            <div class="actions">
                <button class="btn btn-savings">Guardar</button>
                <button class="btn btn-base">Cancelar</button>
            </div>
        </div>


    </div>
